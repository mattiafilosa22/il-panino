version: '3.8'

services:
  db:
    image: mariadb:10.11
    container_name: wp_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    volumes:
      - db_data:/var/lib/mysql
      - ./data:/docker-entrypoint-initdb.d

  wordpress:
    depends_on:
      - db
      - redis
    image: wordpress:latest
    container_name: wp_app
    restart: always
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG', true);
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', true);
        define('WP_REDIS_HOST', 'redis');
        define('WP_REDIS_PORT', '6379');
    volumes:
      - wp_data:/var/www/html
      - ./wp-content/themes/il-panino-theme:/var/www/html/wp-content/themes/il-panino-theme
      - ./wp-content/plugins:/var/www/html/wp-content/plugins

  redis:
    image: redis:alpine
    container_name: wp_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  scss-watcher:
    image: node:18-alpine
    container_name: wp_scss_watcher
    working_dir: /usr/src/theme
    volumes:
      - ./wp-content/themes/il-panino-theme:/usr/src/theme
    command: sh -c "npm install && npm run watch:scss"

volumes:
  db_data:
  wp_data:
  redis_data:
